<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>

    body{
        font-family:Arial;
        width:600px;
        margin:auto;
        margin-top:50px;
    }

    #chat{
        height:400px;
        border:1px solid gray;
        padding:10px;
        overflow-y:auto;
        margin-bottom:10px;
    }

    input{
        width:80%;
        padding:10px;
    }

    button{
        padding:10px;
    }

    </style>

</head>

<body>

<h2>🤖 AI Chatbot</h2>

<div id="chat"></div>

<input
type="text"
id="message"
placeholder="Type your message..."
>

<button onclick="sendMessage()">Send</button>


<script>

async function sendMessage(){

let message =
document.getElementById("message").value;

document.getElementById("chat").innerHTML +=
"<p><b>You:</b> "+message+"</p>";


let response =
await fetch("http://127.0.0.1:5000/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

});


let data = await response.json();

document.getElementById("chat").innerHTML +=
"<p><b>Bot:</b> "+data.reply+"</p>";

document.getElementById("message").value="";

}

</script>

</body>

</html>
